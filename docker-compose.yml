services:
  postgres:
    image: postgres:16-alpine
    container_name: bd_nifi_postgres
    environment:
      POSTGRES_DB: nifi_lab
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      TZ: Europe/Moscow
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - "./sql/postgres:/docker-entrypoint-initdb.d:ro"
      - "./sql:/sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "psql -U lab -d nifi_lab -tAc \"select 1 from information_schema.tables where table_schema = 'stage' and table_name = 'sales_raw'\" | grep -q 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  kafka:
    image: apache/kafka:3.7.2
    container_name: bd_nifi_kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9095
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    ports:
      - "9095:9094"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 40

  nifi:
    build:
      context: .
      dockerfile: docker/nifi/Dockerfile
    image: bd-nifi-lab:local
    container_name: bd_nifi
    environment:
      NIFI_WEB_HTTP_PORT: "8080"
      NIFI_WEB_HTTPS_PORT: ""
      NIFI_SENSITIVE_PROPS_KEY: nifi-lab-sensitive-key
      NIFI_JVM_HEAP_INIT: 512m
      NIFI_JVM_HEAP_MAX: 1g
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://$(hostname):8080/nifi-api/system-diagnostics >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 40

  nifi-init:
    build:
      context: .
      dockerfile: docker/nifi-init/Dockerfile
    image: bd-nifi-flow-init:local
    container_name: bd_nifi_init
    environment:
      NIFI_API: http://nifi:8080/nifi-api
    depends_on:
      nifi:
        condition: service_healthy

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    image: bd-nifi-producer:local
    container_name: bd_nifi_producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: pet_sales_raw
      DATA_DIR: /data
    volumes:
      - "./исходные данные:/data:ro"
    depends_on:
      kafka:
        condition: service_healthy

  metabase:
    image: metabase/metabase:v0.51.13
    container_name: bd_nifi_metabase
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    ports:
      - "3002:3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 40

volumes:
  pgdata:
  metabase_data:
